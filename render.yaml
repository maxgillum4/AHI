services:
  - type: web
    name: ahi-maturity-assessment
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AHI_DB_PATH
        value: /tmp/ahi.db
      # Optional: set ANTHROPIC_API_KEY here if you want Claude-powered follow-ups
      # - key: ANTHROPIC_API_KEY
      #   sync: false   # prompts you to enter it in the Render dashboard
    healthCheckPath: /api/health
